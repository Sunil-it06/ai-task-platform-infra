apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-task-worker
  labels:
    app: ai-task-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-task-worker
  template:
    metadata:
      labels:
        app: ai-task-worker
    spec:
      containers:
        - name: worker
          # The workflow will find this placeholder line and update it on every push
          image: sunil-it06/ai-task-worker:latest
          imagePullPolicy: Always
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            # Add worker-specific environment variables here