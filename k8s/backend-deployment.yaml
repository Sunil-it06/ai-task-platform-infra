apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-task-backend
  labels:
    app: ai-task-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-task-backend
  template:
    metadata:
      labels:
        app: ai-task-backend
    spec:
      containers:
        - name: backend
          # The workflow will find this placeholder line and update it on every push
          image: sunil-it06/ai-task-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            # --- INJECTED MINGO_URI VARIABLE ---
            - name: MONGO_URI
              value: "mongodb+srv://sunilguptait06:Sunil%40mern1@cluster0.stuqq5m.mongodb.net/ai-task-manager?retryWrites=true&w=majority&appName=Cluster0"
            # --- REDIS HOST (For asynchronous task queuing) ---
            - name: REDIS_HOST
              value: "argocd-redis"