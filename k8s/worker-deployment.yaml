apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-task-worker
  labels:
    app: ai-task-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-task-worker
  template:
    metadata:
      labels:
        app: ai-task-worker
    spec:
      containers:
        - name: worker
          image: sunil2809/ai-task-worker:latest
          imagePullPolicy: Always
          # --- THE MAGIC BYPASS ---
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Bypassing indentation bug and explicitly calling main()..."
              python -u -c "import worker; worker.main()"
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: MONGO_URI
              value: "mongodb+srv://sunilguptait06:Sunil%40mern1@cluster0.stuqq5m.mongodb.net/ai-task-manager?retryWrites=true&w=majority&appName=Cluster0"
            # --- UPDATED TO CROSS-NAMESPACE DNS ---
            - name: REDIS_URL
              value: "redis://argocd-redis.argocd.svc.cluster.local:6379"