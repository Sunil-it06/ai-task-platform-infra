apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-task-worker
  labels:
    app: ai-task-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-task-worker
  template:
    metadata:
      labels:
        app: ai-task-worker
    spec:
      containers:
        - name: worker
          image: sunil2809/ai-task-worker:0f4c896
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Initializing worker with secure keyword parsing..."
              python -u -c "
              import os, worker, redis
              # Construct client directly via kwargs to bypass URL parsing bugs
              worker.Redis.from_url = lambda url: redis.Redis(
                  host=os.getenv('REDIS_HOST'),
                  port=int(os.getenv('REDIS_PORT', 6379)),
                  password=os.getenv('REDIS_PASSWORD')
              )
              worker.main()
              "
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: MONGO_URI
              value: "mongodb+srv://sunilguptait06:Sunil%40mern1@cluster0.stuqq5m.mongodb.net/ai-task-manager?retryWrites=true&w=majority&appName=Cluster0"
            - name: REDIS_HOST
              value: "argocd-redis.argocd.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: argocd-secret
                  key: admin.password
            # Keep this as a dummy placeholder so line 28 of your worker.py doesn't crash on missing vars
            - name: REDIS_URL
              value: "redis://localhost:6379"