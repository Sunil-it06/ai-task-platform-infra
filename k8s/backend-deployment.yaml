apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-task-backend
  labels:
    app: ai-task-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-task-backend
  template:
    metadata:
      labels:
        app: ai-task-backend
    spec:
      containers:
        - name: backend
          # The workflow will find this placeholder line and update it on every push
          image: sunil2809/ai-task-backend:b779270
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            # --- INJECTED MONGO_URI VARIABLE ---
            - name: MONGO_URI
              value: "mongodb+srv://sunilguptait06:Sunil%40mern1@cluster0.stuqq5m.mongodb.net/ai-task-manager?retryWrites=true&w=majority&appName=Cluster0"
            # --- REDIS HOST (For asynchronous task queuing) ---
            - name: REDIS_HOST
              value: "argocd-redis"

---
apiVersion: v1
kind: Service
metadata:
  name: backend  # <-- THIS IS EXACTLY WHAT THE FRONTEND'S NGINX IS LOOKING FOR
spec:
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: ai-task-backend  # Routes traffic directly to the backend container above